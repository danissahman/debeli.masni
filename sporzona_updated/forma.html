<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportZona - Kontakt</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="forma.css">
</head>
<body>

<header>
    <h1>📬 SportZona</h1>
</header>

<nav>
    <a href="fudbal.html">Fudbal</a>
    <a href="kosarka.html">Košarka</a>
    <a href="forma.html" class="active">Kontakt</a>
</nav>

<main class="container" style="max-width:600px">
    <section class="card">
        <div class="card-body">
            <h2 class="card-title mb-4">Kontaktirajte nas</h2>

            <div id="poruka-greska" class="alert alert-danger" style="display:none;"></div>
            <div id="poruka-uspjeh" class="alert alert-success" style="display:none;"></div>

            <div class="mb-3">
                <label for="ime" class="form-label fw-bold">Ime i prezime</label>
                <input type="text" id="ime" class="form-control" placeholder="Vaše ime">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-bold">Email adresa</label>
                <input type="text" id="email" class="form-control" placeholder="vas@email.com">
            </div>

            <div class="mb-3">
                <label for="tekst" class="form-label fw-bold">Poruka</label>
                <textarea id="tekst" rows="5" class="form-control" placeholder="Vaša poruka..."></textarea>
            </div>

            <div class="d-flex gap-2 flex-wrap mb-3">
                <button id="btn-pošalji" class="btn btn-dark">Pošalji</button>
                <button id="btn-tema-svijetla" class="btn btn-outline-secondary btn-sm">Svijetla tema</button>
                <button id="btn-tema-tamna" class="btn btn-outline-dark btn-sm">Tamna tema</button>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>© 2024 SportZona</p>
</footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="forma.js"></script>
</body>
</html>
